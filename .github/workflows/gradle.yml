name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build
        run: ./gradlew assembleRelease --stacktrace
      - name: Sign APK
        run: |
          java -jar "signer/apksigner.jar" sign \
            --key "signer/apkeasytool.pk8" \
            --cert "signer/apkeasytool.pem" \
            --v4-signing-enabled false \
            --out "app/build/outputs/apk/release/youtube-lite-signed.apk" \
            "app/build/outputs/apk/release/app-release-unsigned.apk"
      - name: Extract version name
        id: ver
        run: |
          VNAME=$(grep -oP 'versionName\s+"\K[^"]+' app/build.gradle)
          echo "version=$VNAME" >> "$GITHUB_OUTPUT"
      - name: Publish/Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "v${{ steps.ver.outputs.version }}"
          body: "Automatically built APK — version ${{ steps.ver.outputs.version }}"
          files: app/build/outputs/apk/release/youtube-lite-signed.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
